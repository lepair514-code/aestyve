<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aestyve — Product</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .detail-wrap {
      min-height: 100vh;
      background: #fff;
      padding-top: 64px; /* header height */
    }
    .detail-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 72px 32px 100px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 72px;
      align-items: start;
    }
    .detail-img-col {
      background: #f8f8f6;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .detail-img-col img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
    }
    .detail-info-col {
      padding-top: 12px;
    }
    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #9aa0b8;
      margin-bottom: 36px;
      cursor: pointer;
      text-decoration: none;
      transition: color .2s;
    }
    .detail-back:hover { color: #1A2755; }
    .detail-name {
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-weight: 700;
      color: #1A2755;
      line-height: 1.1;
      margin-bottom: 28px;
      letter-spacing: -.02em;
    }
    .detail-divider {
      width: 40px;
      height: 2px;
      background: #1A2755;
      margin-bottom: 28px;
    }
    .detail-desc {
      font-size: 1rem;
      color: #555c78;
      line-height: 1.9;
      white-space: pre-line;
    }
    .detail-empty {
      font-size: .9rem;
      color: #bbb;
      font-style: italic;
    }

    /* ─── 상세 이미지 갤러리 ─── */
    .detail-images-outer {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 32px 80px;
    }
    .detail-images-title {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #9aa0b8;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    #detail-images-section {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .detail-gallery-item {
      border-radius: 4px;
      overflow: hidden;
      background: #f8f8f6;
      cursor: zoom-in;
      aspect-ratio: 4 / 3;
    }
    .detail-gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .35s ease;
    }
    .detail-gallery-item:hover img { transform: scale(1.04); }

    /* ─── 라이트박스 ─── */
    #lightbox-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #lightbox-bg {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.88);
    }
    #lightbox-img-wrap {
      position: relative;
      z-index: 1;
      max-width: 90vw;
      max-height: 88vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 8px 48px rgba(0,0,0,.6);
    }
    #lightbox-close {
      position: absolute;
      top: 16px;
      right: 20px;
      z-index: 2;
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      font-size: 1.4rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
    }
    #lightbox-close:hover { background: rgba(255,255,255,.3); }
    #lightbox-prev, #lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      font-size: 2rem;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
    }
    #lightbox-prev { left: 16px; }
    #lightbox-next { right: 16px; }
    #lightbox-prev:hover, #lightbox-next:hover { background: rgba(255,255,255,.3); }
    #lightbox-counter {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      color: rgba(255,255,255,.7);
      font-size: .82rem;
      letter-spacing: .06em;
    }

    @media (max-width: 768px) {
      .detail-inner {
        grid-template-columns: 1fr;
        gap: 36px;
        padding: 48px 20px 40px;
      }
      .detail-images-outer {
        padding: 0 20px 60px;
      }
      #detail-images-section {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 10px;
      }
      #lightbox-prev { left: 8px; }
      #lightbox-next { right: 8px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header id="site-header">
  <div class="container">
    <div class="header-inner">
      <a href="index.html" class="logo-wrap" aria-label="Aestyve 홈">
        <img src="images/logo.png" alt="Aestyve" id="header-logo" />
      </a>
      <nav id="main-nav" aria-label="주 내비게이션"></nav>
      <div class="header-actions">
        <div id="lang-switcher" role="group" aria-label="언어 선택"></div>
        <button class="hamburger" id="hamburger" aria-label="메뉴 열기" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </div>
  <nav id="mobile-nav" aria-label="모바일 내비게이션">
    <div id="mobile-nav-links"></div>
    <div class="mobile-lang-row" id="mobile-lang-switcher"></div>
  </nav>
</header>

<div class="detail-wrap">
  <div class="detail-inner">
    <div class="detail-img-col">
      <img id="detail-img" src="" alt="" />
    </div>
    <div class="detail-info-col">
      <a href="index.html#products" class="detail-back">&#8592; Products</a>
      <h1 class="detail-name" id="detail-name"></h1>
      <div class="detail-divider"></div>
      <p class="detail-desc" id="detail-desc"></p>
    </div>
  </div>

  <!-- 상세 이미지 갤러리 -->
  <div class="detail-images-outer">
    <div id="detail-images-section" style="display:none;"></div>
  </div>
</div>

<div id="toast" role="alert" aria-live="polite"></div>
<script src="js/product.js"></script>
</body>
</html>
