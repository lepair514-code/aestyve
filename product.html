<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aestyve — Product</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- HEADER -->
<header id="site-header">
  <div class="container">
    <div class="header-inner">
      <a href="index.html" class="logo-wrap" aria-label="Aestyve 홈">
        <img src="images/logo.png" alt="Aestyve" id="header-logo" />
      </a>
      <nav id="main-nav" aria-label="주 내비게이션"></nav>
      <div class="header-actions">
        <div id="lang-switcher" role="group" aria-label="언어 선택"></div>
        <button class="hamburger" id="hamburger" aria-label="메뉴 열기" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </div>
  <nav id="mobile-nav" aria-label="모바일 내비게이션">
    <div id="mobile-nav-links"></div>
    <div class="mobile-lang-row" id="mobile-lang-switcher"></div>
  </nav>
</header>

<!-- PRODUCT DETAIL -->
<div class="detail-wrap">

  <!-- 상단: 이미지 + 기본정보 -->
  <div class="detail-top">
    <div class="container">
      <div class="detail-top-inner">

        <!-- 왼쪽: 메인 이미지 -->
        <div class="detail-img-col">
          <div class="detail-main-img-wrap">
            <img id="detail-img" src="" alt="" />
          </div>
        </div>

        <!-- 오른쪽: 제품 정보 -->
        <div class="detail-info-col">
          <a href="index.html#products" class="detail-back">
            <i class="fas fa-arrow-left"></i> Products
          </a>

          <!-- 배지 -->
          <div class="detail-badges" id="detail-badges"></div>

          <!-- 제품명 -->
          <h1 class="detail-name" id="detail-name"></h1>
          <div class="detail-divider"></div>

          <!-- 목적/설명 -->
          <p class="detail-purpose" id="detail-purpose"></p>

          <!-- 스펙 테이블 -->
          <div class="detail-specs" id="detail-specs"></div>

          <!-- 보관 방법 -->
          <div class="detail-storage" id="detail-storage"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 하단: 카탈로그 이미지 갤러리 -->
  <div class="detail-gallery-section" id="detail-gallery-section" style="display:none;">
    <div class="container">
      <div class="detail-gallery-title">Product Catalog</div>
      <div class="detail-gallery-grid" id="detail-gallery-grid"></div>
    </div>
  </div>

</div>

<!-- 라이트박스 -->
<div id="lightbox" style="display:none;" role="dialog" aria-modal="true" aria-label="이미지 뷰어">
  <div id="lightbox-bg"></div>
  <button id="lightbox-close" aria-label="닫기"><i class="fas fa-times"></i></button>
  <button id="lightbox-prev" aria-label="이전"><i class="fas fa-chevron-left"></i></button>
  <button id="lightbox-next" aria-label="다음"><i class="fas fa-chevron-right"></i></button>
  <div id="lightbox-img-wrap">
    <img id="lightbox-img" src="" alt="" />
  </div>
  <div id="lightbox-counter"></div>
</div>

<div id="toast" role="alert" aria-live="polite"></div>
<script src="js/product.js"></script>
</body>
</html>
