<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aestyve Admin | 관리자</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <style>
    :root {
      --primary: #1A2755;
      --primary-light: #2F3C86;
      --accent: #4F7EF7;
      --bg: #f4f6f9;
      --surface: #fff;
      --border: #e2e6ed;
      --text: #1a1a2e;
      --text-mid: #5a6375;
      --text-light: #9aa3b2;
      --radius: 10px;
      --shadow: 0 2px 16px rgba(26,39,85,0.08);
      --transition: 0.22s ease;
      /* lang tab colors */
      --lang-ko: #C0392B; --lang-en: #1A237E; --lang-zh: #B71C1C; --lang-th: #1565C0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; }

    /* ── SIDEBAR ── */
    .admin-layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px; background: var(--primary); color: #fff;
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; height: 100vh; z-index: 50;
      transition: width var(--transition);
    }
    .sidebar-logo {
      padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; gap: 12px;
    }
    .sidebar-logo img { height: 36px; filter: brightness(0) invert(1); }
    .sidebar-logo-text { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.8); }
    .sidebar-nav { flex: 1; padding: 16px 0; overflow-y: auto; }
    .sidebar-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.4);
      padding: 8px 20px 4px;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px; font-size: 14px; font-weight: 500;
      color: rgba(255,255,255,0.75);
      cursor: pointer; border: none; background: none; width: 100%;
      text-align: left; transition: all var(--transition);
      border-left: 3px solid transparent;
    }
    .sidebar-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .sidebar-item.active { background: rgba(255,255,255,0.12); color: #fff; border-left-color: #7DA9FF; }
    .sidebar-item i { width: 18px; text-align: center; font-size: 15px; }
    .sidebar-bottom { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.12); }
    .sidebar-bottom a { font-size: 13px; color: rgba(255,255,255,0.6); display: flex; align-items: center; gap: 8px; transition: color var(--transition); }
    .sidebar-bottom a:hover { color: #fff; }

    /* ── MAIN CONTENT ── */
    .admin-main { margin-left: 240px; flex: 1; }
    .admin-topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 40;
    }
    .topbar-title { font-size: 18px; font-weight: 700; color: var(--text); }
    .topbar-actions { display: flex; align-items: center; gap: 12px; }
    .topbar-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-mid);
      background: var(--bg); padding: 6px 12px; border-radius: 20px;
    }
    .topbar-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #27ae60; }
    .preview-btn {
      background: var(--primary); color: #fff;
      padding: 8px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 600; border: none;
      display: flex; align-items: center; gap: 6px;
      transition: background var(--transition);
    }
    .preview-btn:hover { background: var(--primary-light); }

    /* ── PANELS ── */
    .admin-panel { display: none; padding: 32px; }
    .admin-panel.active { display: block; }

    /* ── CARDS ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      margin-bottom: 24px;
    }
    .card-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .card-subtitle { font-size: 12px; color: var(--text-light); margin-top: 2px; }
    .card-body { padding: 24px; }

    /* ── FORM FIELDS ── */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .form-row.single { grid-template-columns: 1fr; }
    .form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--text-mid); letter-spacing: 0.04em; }
    .form-control {
      padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 14px; color: var(--text);
      background: var(--surface); font-family: inherit;
      transition: border-color var(--transition), box-shadow var(--transition);
      width: 100%;
    }
    .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,126,247,0.12); }
    textarea.form-control { resize: vertical; min-height: 90px; line-height: 1.6; }
    .form-toggle { display: flex; align-items: center; gap: 10px; }
    .toggle-switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0; border-radius: 24px;
      background: #ccd; cursor: pointer; transition: background var(--transition);
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      height: 18px; width: 18px; left: 3px; top: 3px;
      border-radius: 50%; background: #fff;
      transition: transform var(--transition);
    }
    .toggle-switch input:checked + .toggle-slider { background: #27ae60; }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }
    .toggle-label { font-size: 13px; color: var(--text-mid); }

    /* ── LANG TABS ── */
    .lang-tabs { display: flex; gap: 0; border-radius: 8px; overflow: hidden; border: 1.5px solid var(--border); width: fit-content; margin-bottom: 16px; }
    .lang-tab-btn {
      padding: 7px 16px; font-size: 13px; font-weight: 600; border: none;
      background: var(--bg); color: var(--text-mid); cursor: pointer;
      transition: all var(--transition); display: flex; align-items: center; gap: 5px;
    }
    .lang-tab-btn + .lang-tab-btn { border-left: 1.5px solid var(--border); }
    .lang-tab-btn.active { background: var(--primary); color: #fff; }
    .lang-tab-content { display: none; }
    .lang-tab-content.active { display: block; }

    /* ── BUTTONS ── */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; transition: all var(--transition); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-light); }
    .btn-secondary { background: var(--bg); color: var(--text-mid); border: 1.5px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-danger:hover { background: #c0392b; }
    .btn-success { background: #27ae60; color: #fff; }
    .btn-success:hover { background: #219a52; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* ── ITEMS LIST ── */
    .items-list { display: flex; flex-direction: column; gap: 12px; }
    .item-row {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    }
    .item-thumb {
      width: 60px; height: 60px; border-radius: 6px;
      object-fit: cover; background: var(--border); flex-shrink: 0;
    }
    .item-info { flex: 1; }
    .item-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .item-meta { font-size: 12px; color: var(--text-light); }
    .item-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ── STATS ── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 28px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; }
    .stat-number { font-size: 28px; font-weight: 800; color: var(--primary); }
    .stat-label { font-size: 12px; color: var(--text-light); margin-top: 4px; }

    /* ── ALERT ── */
    .alert { padding: 12px 18px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: 14px;
      width: 90%; max-width: 680px; max-height: 90vh;
      overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,0.25);
    }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surface); z-index: 10;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 22px; color: var(--text-light); cursor: pointer; }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; }

    /* ── COLOR SWATCH ── */
    .color-input-wrap { display: flex; align-items: center; gap: 10px; }
    .color-swatch { width: 36px; height: 36px; border-radius: 6px; border: 1.5px solid var(--border); overflow: hidden; flex-shrink: 0; }
    .color-swatch input[type="color"] { width: 100%; height: 100%; border: none; padding: 0; cursor: pointer; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .sidebar { width: 60px; }
      .sidebar-logo-text, .sidebar-section-label, .sidebar-item span { display: none; }
      .sidebar-item { justify-content: center; padding: 14px; }
      .admin-main { margin-left: 60px; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .admin-panel { padding: 16px; }
      .admin-topbar { padding: 0 16px; }
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="admin-layout">
  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="images/logo.png" alt="Aestyve" />
      <div class="sidebar-logo-text">Admin</div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">콘텐츠 관리</div>
      <button class="sidebar-item active" data-panel="dashboard" onclick="showPanel('dashboard')">
        <i class="fas fa-home"></i><span>대시보드</span>
      </button>
      <button class="sidebar-item" data-panel="settings" onclick="showPanel('settings')">
        <i class="fas fa-cog"></i><span>사이트 설정</span>
      </button>
      <button class="sidebar-item" data-panel="banners" onclick="showPanel('banners')">
        <i class="fas fa-image"></i><span>히어로 배너</span>
      </button>
      <button class="sidebar-item" data-panel="categories" onclick="showPanel('categories')">
        <i class="fas fa-th-large"></i><span>카테고리</span>
      </button>
      <button class="sidebar-item" data-panel="products" onclick="showPanel('products')">
        <i class="fas fa-box"></i><span>제품</span>
      </button>
      <button class="sidebar-item" data-panel="reviews" onclick="showPanel('reviews')">
        <i class="fas fa-star"></i><span>리뷰</span>
      </button>
    </nav>
    <div class="sidebar-bottom">
      <a href="index.html" target="_blank"><i class="fas fa-external-link-alt"></i><span>홈페이지 보기</span></a>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="admin-main">
    <!-- Topbar -->
    <div class="admin-topbar">
      <div class="topbar-title" id="panelTitle">대시보드</div>
      <div class="topbar-actions">
        <div class="topbar-badge"><span class="dot"></span>저장됨</div>
        <a href="index.html" target="_blank" class="preview-btn"><i class="fas fa-eye"></i> 미리보기</a>
      </div>
    </div>

    <!-- Alert area -->
    <div id="alertArea" style="padding: 0 32px; padding-top:16px; display:none;"></div>

    <!-- ── DASHBOARD ── -->
    <div class="admin-panel active" id="panel-dashboard">
      <div class="stats-row" id="dashStats">
        <div class="stat-card"><div class="stat-number" id="statBanners">-</div><div class="stat-label">히어로 배너</div></div>
        <div class="stat-card"><div class="stat-number" id="statCategories">-</div><div class="stat-label">카테고리</div></div>
        <div class="stat-card"><div class="stat-number" id="statProducts">-</div><div class="stat-label">제품</div></div>
        <div class="stat-card"><div class="stat-number" id="statReviews">-</div><div class="stat-label">리뷰</div></div>
      </div>
      <div class="card">
        <div class="card-header">
          <div><div class="card-title">🚀 빠른 작업</div><div class="card-subtitle">자주 사용하는 메뉴</div></div>
        </div>
        <div class="card-body" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;">
          <button class="btn btn-primary" onclick="showPanel('settings')"><i class="fas fa-cog"></i> 사이트 설정</button>
          <button class="btn btn-secondary" onclick="showPanel('banners')"><i class="fas fa-image"></i> 배너 관리</button>
          <button class="btn btn-secondary" onclick="showPanel('products')"><i class="fas fa-box"></i> 제품 관리</button>
          <button class="btn btn-secondary" onclick="showPanel('reviews')"><i class="fas fa-star"></i> 리뷰 관리</button>
          <a href="index.html" target="_blank" class="btn btn-secondary"><i class="fas fa-external-link-alt"></i> 홈페이지 보기</a>
        </div>
      </div>
      <div class="alert alert-info"><i class="fas fa-info-circle"></i> 변경사항은 저장 후 홈페이지에 즉시 반영됩니다.</div>
    </div>

    <!-- ── SITE SETTINGS ── -->
    <div class="admin-panel" id="panel-settings">
      <div class="card">
        <div class="card-header"><div class="card-title">사이트 설정</div></div>
        <div class="card-body">
          <form id="settingsForm">
            <div class="form-row">
              <div class="form-group"><label>브랜드명</label><input type="text" id="s_brand_name" class="form-control" placeholder="Aestyve" /></div>
              <div class="form-group"><label>사이트 주 색상 (Primary)</label>
                <div class="color-input-wrap">
                  <div class="color-swatch"><input type="color" id="s_primary_color" value="#1A2755" /></div>
                  <input type="text" id="s_primary_color_hex" class="form-control" placeholder="#1A2755" />
                </div>
              </div>
            </div>
            <!-- Notice Bar -->
            <div class="form-group" style="margin-bottom:12px;">
              <label>공지 바 노출</label>
              <div class="form-toggle">
                <label class="toggle-switch"><input type="checkbox" id="s_notice_visible" checked /><span class="toggle-slider"></span></label>
                <span class="toggle-label">공지 바 표시</span>
              </div>
            </div>
            <div class="form-group" style="margin-bottom:20px;">
              <label>공지 바 텍스트</label>
              <div class="lang-tabs" id="noticeLangTabs">
                <button type="button" class="lang-tab-btn active" data-lang="ko" onclick="switchLangTab('notice','ko')">🇰🇷 한국어</button>
                <button type="button" class="lang-tab-btn" data-lang="en" onclick="switchLangTab('notice','en')">🇺🇸 EN</button>
                <button type="button" class="lang-tab-btn" data-lang="zh-CN" onclick="switchLangTab('notice','zh-CN')">🇨🇳 中文(简)</button>
                <button type="button" class="lang-tab-btn" data-lang="th" onclick="switchLangTab('notice','th')">🇹🇭 ไทย</button>
              </div>
              <div id="notice-ko" class="lang-tab-content active"><input type="text" id="s_notice_text_ko" class="form-control" placeholder="공지 내용 (한국어)" /></div>
              <div id="notice-en" class="lang-tab-content"><input type="text" id="s_notice_text_en" class="form-control" placeholder="Notice text (English)" /></div>
              <div id="notice-zh-CN" class="lang-tab-content"><input type="text" id="s_notice_text_zh_CN" class="form-control" placeholder="公告文本（简体中文）" /></div>
              <div id="notice-th" class="lang-tab-content"><input type="text" id="s_notice_text_th" class="form-control" placeholder="ข้อความประกาศ (ไทย)" /></div>
            </div>
            <!-- Slogan -->
            <div class="form-group" style="margin-bottom:20px;">
              <label>슬로건</label>
              <div class="lang-tabs">
                <button type="button" class="lang-tab-btn active" data-lang="ko" onclick="switchLangTab('slogan','ko')">🇰🇷 한국어</button>
                <button type="button" class="lang-tab-btn" data-lang="en" onclick="switchLangTab('slogan','en')">🇺🇸 EN</button>
                <button type="button" class="lang-tab-btn" data-lang="zh-CN" onclick="switchLangTab('slogan','zh-CN')">🇨🇳 中文(简)</button>
                <button type="button" class="lang-tab-btn" data-lang="th" onclick="switchLangTab('slogan','th')">🇹🇭 ไทย</button>
              </div>
              <div id="slogan-ko" class="lang-tab-content active"><input type="text" id="s_slogan_ko" class="form-control" /></div>
              <div id="slogan-en" class="lang-tab-content"><input type="text" id="s_slogan_en" class="form-control" /></div>
              <div id="slogan-zh-CN" class="lang-tab-content"><input type="text" id="s_slogan_zh_CN" class="form-control" /></div>
              <div id="slogan-th" class="lang-tab-content"><input type="text" id="s_slogan_th" class="form-control" /></div>
            </div>
            <!-- Brand Story -->
            <div class="form-group" style="margin-bottom:20px;">
              <label>브랜드 스토리</label>
              <div class="lang-tabs">
                <button type="button" class="lang-tab-btn active" data-lang="ko" onclick="switchLangTab('bstory','ko')">🇰🇷 한국어</button>
                <button type="button" class="lang-tab-btn" data-lang="en" onclick="switchLangTab('bstory','en')">🇺🇸 EN</button>
                <button type="button" class="lang-tab-btn" data-lang="zh-CN" onclick="switchLangTab('bstory','zh-CN')">🇨🇳 中文(简)</button>
                <button type="button" class="lang-tab-btn" data-lang="th" onclick="switchLangTab('bstory','th')">🇹🇭 ไทย</button>
              </div>
              <div id="bstory-ko" class="lang-tab-content active"><textarea id="s_brand_story_ko" class="form-control" rows="4"></textarea></div>
              <div id="bstory-en" class="lang-tab-content"><textarea id="s_brand_story_en" class="form-control" rows="4"></textarea></div>
              <div id="bstory-zh-CN" class="lang-tab-content"><textarea id="s_brand_story_zh_CN" class="form-control" rows="4"></textarea></div>
              <div id="bstory-th" class="lang-tab-content"><textarea id="s_brand_story_th" class="form-control" rows="4"></textarea></div>
            </div>
            <!-- Stats -->
            <div class="form-group" style="margin-bottom:20px;">
              <label>통계 수치 (브랜드 섹션)</label>
              <div class="form-row triple">
                <div class="form-group"><label>통계 1 숫자</label><input type="text" id="s_stat1_number" class="form-control" placeholder="500+" /></div>
                <div class="form-group"><label>통계 2 숫자</label><input type="text" id="s_stat2_number" class="form-control" placeholder="98%" /></div>
                <div class="form-group"><label>통계 3 숫자</label><input type="text" id="s_stat3_number" class="form-control" placeholder="30+" /></div>
              </div>
              <div class="lang-tabs" style="margin-top:12px;">
                <button type="button" class="lang-tab-btn active" onclick="switchLangTab('stats','ko')">🇰🇷 한국어</button>
                <button type="button" class="lang-tab-btn" onclick="switchLangTab('stats','en')">🇺🇸 EN</button>
                <button type="button" class="lang-tab-btn" onclick="switchLangTab('stats','zh-CN')">🇨🇳 中文(简)</button>
                <button type="button" class="lang-tab-btn" onclick="switchLangTab('stats','th')">🇹🇭 ไทย</button>
              </div>
              <div id="stats-ko" class="lang-tab-content active">
                <div class="form-row triple">
